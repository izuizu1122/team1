<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材を編集 - 食材管理アプリ</title>
    <link rel="stylesheet" href="css/edit-styles.css">
</head>
<body>
    <!-- ナビゲーションバー -->
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="logo">🥬 食材管理</h1>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container edit-container">
        <div class="edit-box">
            <h2 id="pageTitle">食材を追加</h2>

            <form id="ingredientForm" class="ingredient-form" enctype="multipart/form-data">
                <!-- 食材名 -->
                <div class="form-group">
                    <label for="ingredientName">食材名 <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="ingredientName" 
                        name="ingredientName" 
                        placeholder="例：トマト" 
                        required
                    >
                </div>

                <!-- 購入日 -->
                <div class="form-group">
                    <label for="purchaseDate">購入日 <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="purchaseDate" 
                        name="purchaseDate" 
                        required
                    >
                </div>

                <!-- 賞味期限 -->
                <div class="form-group">
                    <label for="expiryDate">賞味期限 <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="expiryDate" 
                        name="expiryDate" 
                        required
                    >
                </div>

                <!-- 数量 -->
                <div class="form-group">
                    <label for="quantity">数量 <span class="required">*</span></label>
                    <div class="quantity-input">
                        <input 
                            type="number" 
                            id="quantity" 
                            name="quantity" 
                            min="1" 
                            value="1" 
                            required
                        >
                        <select id="unit" name="unit">
                            <option value="個">個</option>
                            <option value="本">本</option>
                            <option value="袋">袋</option>
                            <option value="パック">パック</option>
                            <option value="g">g</option>
                            <option value="ml">ml</option>
                        </select>
                    </div>
                </div>

                <!-- カテゴリ -->
                <div class="form-group">
                    <label for="category">カテゴリ</label>
                    <select id="category" name="category">
                        <option value="">選択してください</option>
                        <option value="野菜">野菜</option>
                        <option value="果物">果物</option>
                        <option value="乳製品">乳製品</option>
                        <option value="肉">肉</option>
                        <option value="魚">魚</option>
                        <option value="調味料">調味料</option>
                        <option value="その他">その他</option>
                    </select>
                </div>

                <!-- 写真アップロード -->
                <div class="form-group">
                    <label for="photo">写真</label>
                    <div class="photo-upload">
                        <input 
                            type="file" 
                            id="photo" 
                            name="photo" 
                            accept="image/*"
                        >
                        <div id="photoPreview" class="photo-preview" style="display:none;">
                            <img id="previewImage" src="" alt="プレビュー">
                            <button type="button" class="btn-remove-photo" id="removePhotoBtn">削除</button>
                        </div>
                    </div>
                </div>

                <!-- メモ -->
                <div class="form-group">
                    <label for="memo">メモ</label>
                    <textarea 
                        id="memo" 
                        name="memo" 
                        placeholder="例：冷蔵庫の野菜室に保管"
                        rows="3"
                    ></textarea>
                </div>

                <!-- ボタン -->
                <div class="form-actions">
                    <button type="submit" class="btn-save" id="submitBtn">保存</button>
                    <button type="button" class="btn-cancel" id="cancelBtn">キャンセル</button>
                </div>
            </form>

            <!-- 削除ボタン（編集時のみ） -->
            <div id="deleteSection" class="delete-section" style="display:none;">
                <button type="button" class="btn-delete-edit" id="deleteItemBtn">この食材を削除</button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/edit.js"></script>
</body>
</html>
