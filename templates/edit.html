<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材を編集 - 食材管理アプリ</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/edit-styles.css')}}">
</head>
<body>
    <!-- ナビゲーションバー -->
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="logo">🥬 食材管理</h1>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container edit-container">
        <div class="edit-box">
            <h2 id="pageTitle">食材を追加</h2>

            <form id="ingredientForm" class="ingredient-form" method="POST" action="{% if ingredient %}/edit/{{ ingredient['id'] }}{% else %}/add{% endif %}" enctype="multipart/form-data">
                <!-- 食材名 -->
                <div class="form-group">
                    <label for="ingredientName">食材名 <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="ingredientName" 
                        name="ingredientName" 
                        placeholder="例：トマト" 
                        value="{{ ingredient['name'] if ingredient else '' }}"
                        required
                    >
                </div>

                <!-- 購入日 -->
                <div class="form-group">
                    <label for="purchaseDate">購入日 <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="purchaseDate" 
                        name="purchaseDate" 
                        value="{{ ingredient['purchase_date'] if ingredient else '' }}"
                        required
                    >
                </div>

                <!-- 賞味期限 -->
                <div class="form-group">
                    <label for="expiryDate">賞味期限 <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="expiryDate" 
                        name="expiryDate" 
                        value="{{ ingredient['expiry_date'] if ingredient else '' }}"
                        required
                    >
                </div>

                <!-- 数量 -->
                <div class="form-group">
                    <label for="quantity">数量 <span class="required">*</span></label>
                    <div class="quantity-input">
                        <input 
                            type="number" 
                            id="quantity" 
                            name="quantity" 
                            value="{{ ingredient['quantity'] if ingredient else 1 }}"
                            min="1" 
                            value="1" 
                            required
                        >
                        <select id="unit" name="unit">
                            <option value="個" {% if ingredient and ingredient['unit'] == '個' %}selected{% endif %}>個</option>+
            <option value="本" {% if ingredient and ingredient['unit'] == '本' %}selected{% endif %}>本</option>
            <option value="袋" {% if ingredient and ingredient['unit'] == '袋' %}selected{% endif %}>袋</option>
            <option value="g" {% if ingredient and ingredient['unit'] == 'g' %}selected{% endif %}>g</option>
            <option value="kg" {% if ingredient and ingredient['unit'] == 'kg' %}selected{% endif %}>kg</option>
            <option value="ml" {% if ingredient and ingredient['unit'] == 'ml' %}selected{% endif %}>ml</option>
            <option value="L" {% if ingredient and ingredient['unit'] == 'L' %}selected{% endif %}>L</option>
            <option value="パック" {% if ingredient and ingredient['unit'] == 'パック' %}selected{% endif %}>パック</option>
        </select>
    </div> <div class="form-group">
        <label for="category">カテゴリー</label>
        <select id="category" name="category" class="form-control">
            <option value="野菜" {% if ingredient and ingredient['category'] == '野菜' %}selected{% endif %}>野菜</option>
            <option value="肉" {% if ingredient and ingredient['category'] == '肉' %}selected{% endif %}>肉</option>
            <option value="魚" {% if ingredient and ingredient['category'] == '魚' %}selected{% endif %}>魚</option>
            <option value="調味料" {% if ingredient and ingredient['category'] == '調味料' %}selected{% endif %}>調味料</option>
            <option value="その他" {% if ingredient and ingredient['category'] == 'その他' %}selected{% endif %}>その他</option>
        </select>
    </div>

    <div class="form-group">
        <label for="photo">写真</label>
        <div class="photo-upload">
            <input type="file" id="photo" name="image" accept="image/*">
            
            <div 
            id="photoPreview" 
            class="photo-preview"
            {% if ingredient and ingredient['file_path'] %} 
            style="display:block;"
            {% else %}
            style="display:none;"
            {% endif %}
            >
            
            <img 
            id="previewImage" 
            src="{% if ingredient and ingredient['file_path'] %}/{{ ingredient['file_path'] }}{% endif %}" 
            alt="プレビュー"
            >

            <button 
            type="button"
            id="removePhotoBtn"
            class="btn-remove-photo"
            >
            削除
            </button>
            
            </div>
        </div>    
    </div>

    <div class="form-group">
        <label for="memo">メモ</label>
        <textarea id="memo" name="memo" class="form-control" rows="4" placeholder="例：冷蔵庫の野菜室に保管">{{ ingredient['memo'] if ingredient else '' }}</textarea>
    </div>

    <div class="form-actions mt-4">
        <button type="submit" class="btn btn-save">保存</button>
        <a href="/" class="btn btn-cancel">キャンセル</a>
    </div>
                           
            </form>

            <!-- 削除ボタン（編集時のみ） -->
            <div id="deleteSection" class="delete-section" style="display:none;">
                <button type="button" class="btn-delete-edit" id="deleteItemBtn">この食材を削除</button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
    <script src="{{ url_for('static', filename='js/edit.js') }}"></script>
</body>
</html>
