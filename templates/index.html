<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材管理アプリ - トップページ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- ナビゲーションバー -->
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="logo">🥬 食材管理</h1>
        </div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="container">
        <section class="search-section">
            <form action="/" method="GET" style="display: flex; flex-grow: 1; gap: 10px;"></form>
            <input type="text" name="q" class="search-input" id="searchInput" placeholder="食材を検索..." value="{{ query }}">
            <button type="submit" class="btn-search">検索</button>
            </form>
            <a href="/add" class="btn-add">➕ 新規追加</a>
        </section>

        <section class="ingredient-list" id="ingredientList">
        
        {% for item in ingredients %}
        <div class="ingredient-card">
            <div class="ingredient-info">
                <h3>{{ item["name"] }}</h3>
                
                <p class="purchase-date">
                    📅 購入日: {{ item["purchase_date"] }}
                </p>

                <p class="expiry-date">
                    ⏰ 賞味期限: {{ item["expiry_date"] }}
                </p>

                <p class="category">
                    📦 カテゴリー: {{ item["category"] }}
                </p>

                <p class="memo">
                    📝 メモ: {{ item["memo"] }}
                </p> 

                <p class="quantity">
                    📦 数量:
                    {{ item["quantity"] }}
                    {{ item["unit"] }}
                </p>
            </div>

            <div class="ingredient-actions">
                <a href="/edit/{{ item['id'] }}"
                class="btn-edit">
                編集
            　　</a>

                <form
                action="/delete/{{ item['id'] }}"
                method="POST"
                style="display:inline;"
                >
                
                <button
                type="submit"
                class="btn-delete"
                onclick="return confirm('削除しますか？')"
                >
                削除
                </button>
            
                </form>
            </div>
        </div>
        {% endfor %}
        
    </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
    <script src="/static/js/toast.js"></script>
    <script src="/static/js/loading.js"></script>
    <script src="/static/js/index.js"></script>
</body>
</html>
